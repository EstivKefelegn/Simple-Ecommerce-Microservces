basePath: /
definitions:
  clients.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  clients.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: password123
        type: string
      username:
        example: john
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    API Gateway for Ecommerce Microservices (UserAuth, Product, Order).
    It supports 3 communication ways: REST API to communicate the client frontend with our services via the gateway, gRPC to communicate service-to-service (e.g., check product stock when an order is created), RabbitMQ to store user-created events.
  title: Ecommerce Microservices Gateway API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return token
      parameters:
      - description: Login credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/clients.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create new user account
      parameters:
      - description: Register data
        in: body
        name: register
        required: true
        schema:
          $ref: '#/definitions/clients.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Register new user
      tags:
      - Auth
  /orders:
    post:
      consumes:
      - application/json
      description: Create new order for authenticated user
      parameters:
      - description: Order payload
        in: body
        name: order
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create order
      tags:
      - Orders
  /product/{id}:
    get:
      description: Retrieve product details
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get product by ID
      tags:
      - Products
  /products:
    get:
      description: Retrieve all available products
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      summary: Get all products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Add new product (authenticated)
      parameters:
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create product
      tags:
      - Products
swagger: "2.0"
